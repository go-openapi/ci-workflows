# Security model:
#   This reusable workflow checks out untrusted PR head code and runs the Go
#   toolchain against it (go list -m), then processes coverage artifacts whose
#   contents and file names are produced by that untrusted code.
#
#   It is SAFE ONLY when called in-run from a `pull_request` trigger (or a
#   trusted push), where fork PRs receive no secrets and a read-only token.
#   NEVER front this workflow with `pull_request_target` or bridge it via
#   `workflow_run`: that would run attacker-controlled code/artifacts in a
#   privileged context with secrets and turn the checkout + toolchain step
#   into remote code execution.
#
#   Invariant for the steps below: no value read from a file or artifact is
#   ever expanded through a `${{ }}` shell sink, and artifact-derived file
#   names are always passed quoted (never via an unquoted `$(...)`).

name: Collect coverage

permissions:
  pull-requests: read
  contents: read

on:
  workflow_call:

jobs:
  collect-coverage:
    # description: |
    #   Gather, merge then uploads test coverage files from all test jobs (this includes integration tests,
    #   like codegen-test). This reduces the number of failures due to codecov hitting github API rate limit.
    name: collect test coverage
    runs-on: ubuntu-latest
    steps:
      -
        name: Check whether PR head branch still exists
        id: head
        # Auto-merge does not wait on this job (codecov uploads are flaky, so
        # the status is intentionally not required). If the PR auto-merges
        # before this job runs, GitHub's auto-delete-branch policy removes
        # the source branch and the checkout step below fails with a noisy
        # "Reference not found" error. Detect that case here and skip the
        # rest of the job cleanly so the workflow conclusion stays green.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ -z "${PR_HEAD_REPO}" || -z "${PR_HEAD_REF}" ]]; then
            # Not a pull_request context (e.g. workflow called from push) -- proceed.
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if gh api "repos/${PR_HEAD_REPO}/branches/${PR_HEAD_REF}" --silent >/dev/null 2>&1; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice title=skip-coverage::PR head ${PR_HEAD_REPO}@${PR_HEAD_REF} no longer exists (likely auto-merged before coverage upload); skipping"
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi
      -
        if: ${{ steps.head.outputs.available == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      -
        if: ${{ steps.head.outputs.available == 'true' }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          check-latest: true
          cache: true
      -
        if: ${{ steps.head.outputs.available == 'true' }}
        name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: "${{ github.run_id }}"
          pattern: "*.coverage.*"
          # artifacts resolve as folders
          path: coverage/
      -
        if: ${{ steps.head.outputs.available == 'true' }}
        name: Reprocess coverage paths
        # on projects with a v2 suffix, the go import path reported by coverage doesn't match
        # well the actual path. codecov knows about that for the root module, but is unable
        # to find its way with versioned go sub-modules.
        # We rewrite paths in coverage paths to match actual repo folders.
        run: |
          # Coverage filenames are derived from (untrusted) fork-produced
          # artifacts, so collect them NUL-delimited into an array and pass them
          # to sed quoted. Never use an unquoted $(find ...) here: a hostile file
          # name would word-split or glob into sed's argv.
          mapfile -d '' -t cover_files < <(find coverage -type f -name '*.coverage.*.out' -print0)
          if [[ ${#cover_files[@]} -eq 0 ]]; then
            echo "::notice title=coverage::no coverage files found to reprocess"
            exit 0
          fi

          # name/path are read from the untrusted checked-out go.mod via the go
          # toolchain. Go module paths are restricted to [A-Za-z0-9-._~/], so they
          # cannot carry shell or sed metacharacters; we still keep them double
          # quoted and never route file/artifact data through an Actions
          # expression-interpolation sink.
          go list -m -f '{"name":{{ printf "%q" .Path }},"path":{{ printf "%q" .Dir }}}' |\
          jq -r '[.name,.path] | @tsv' |\
          while IFS=$'\t' read -r name path ; do
            target="github.com/${GITHUB_REPOSITORY}/${path#${GITHUB_WORKSPACE}/}"
            sed -i "s|${name}|${target}|" "${cover_files[@]}"
          done
      -
        if: ${{ steps.head.outputs.available == 'true' }}
        name: Upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          name: Aggregated coverage
          # All *.coverage.*.out files uploaded should be detected by the codecov action.
          # NOTE: we lose the flags on individual test reports (e.g. by os, by go version, unit vs integration tests)
          fail_ci_if_error: false
          verbose: false
